<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SRE Copilot — Payabli</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0a0c10;
      --surface:   #111318;
      --surface2:  #181c24;
      --border:    #1e2330;
      --text:      #e2e6f0;
      --muted:     #606880;
      --blue:      #4f7cff;
      --green:     #2dd98f;
      --red:       #ff5f5f;
      --yellow:    #f5c842;
      --purple:    #a78bfa;
      --orange:    #ff8c42;
      --font-mono: 'IBM Plex Mono', monospace;
      --font-body: 'DM Sans', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 14px;
      min-height: 100vh;
    }

    /* Config warning banner */
    #config-warning {
      background: rgba(245, 200, 66, 0.12);
      border-bottom: 1px solid rgba(245, 200, 66, 0.3);
      color: var(--yellow);
      font-family: var(--font-body);
      font-size: 13px;
      padding: 10px 24px;
      display: none;
    }

    /* Header */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    .logo {
      font-family: var(--font-mono);
      font-size: 16px;
      font-weight: 500;
      color: var(--blue);
      letter-spacing: 0.02em;
    }

    .logo-sub {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--muted);
    }

    /* Input bar */
    .input-bar {
      display: flex;
      gap: 10px;
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    #ticket-input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 13px;
      padding: 10px 14px;
      resize: none;
      outline: none;
      transition: border-color 0.15s;
      line-height: 1.5;
    }

    #ticket-input:focus {
      border-color: var(--blue);
    }

    #ticket-input::placeholder {
      color: var(--muted);
    }

    #analyze-btn {
      background: var(--blue);
      border: none;
      border-radius: 6px;
      color: #fff;
      cursor: pointer;
      font-family: var(--font-body);
      font-size: 14px;
      font-weight: 600;
      padding: 0 24px;
      white-space: nowrap;
      transition: background 0.15s, opacity 0.15s;
    }

    #analyze-btn:hover { background: #3d69e8; }
    #analyze-btn:active { opacity: 0.85; }

    /* Results container */
    #results {
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      max-width: 900px;
      margin: 0 auto;
    }

    /* Ticket card */
    .ticket-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 3px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .ticket-card.loading {
      border-left-color: var(--border);
      animation: fadeIn 0.2s ease, pulseBorder 1.5s ease-in-out infinite;
    }

    @keyframes pulseBorder {
      0%, 100% { border-left-color: var(--border); }
      50%       { border-left-color: var(--blue); }
    }

    /* Card topbar */
    .card-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
    }

    .ticket-id-badge {
      font-family: var(--font-mono);
      font-size: 13px;
      font-weight: 500;
      color: var(--blue);
      background: rgba(79, 124, 255, 0.12);
      border: 1px solid rgba(79, 124, 255, 0.25);
      border-radius: 4px;
      padding: 2px 8px;
    }

    .card-status {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--muted);
      font-style: italic;
    }

    /* Card body */
    .card-body {
      padding: 0;
    }

    /* Ticket header */
    .ticket-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
    }

    .ticket-title {
      font-size: 17px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 10px;
      line-height: 1.4;
    }

    .ticket-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 10px;
    }

    .meta-pill {
      font-family: var(--font-mono);
      font-size: 11px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2px 8px;
      color: var(--text);
    }

    .meta-pill.muted { color: var(--muted); }

    /* Description block */
    .description-block {
      margin-top: 8px;
    }

    .description-block summary {
      cursor: pointer;
      font-size: 12px;
      color: var(--muted);
      user-select: none;
      list-style: none;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .description-block summary::before {
      content: '›';
      font-size: 14px;
      transition: transform 0.15s;
      display: inline-block;
    }

    .description-block[open] summary::before {
      transform: rotate(90deg);
    }

    .description-text {
      margin-top: 8px;
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--muted);
      white-space: pre-wrap;
      word-break: break-word;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 12px;
      max-height: 300px;
      overflow-y: auto;
      line-height: 1.6;
    }

    /* Sections */
    .section {
      border-bottom: 1px solid var(--border);
    }

    .section:last-child {
      border-bottom: none;
    }

    details.section > summary {
      cursor: pointer;
      list-style: none;
      user-select: none;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 20px;
    }

    details.section > summary::before {
      content: '›';
      font-size: 14px;
      transition: transform 0.15s;
      display: inline-block;
      color: var(--muted);
      flex-shrink: 0;
    }

    details.section[open] > summary::before {
      transform: rotate(90deg);
    }

    .section-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 1;
    }

    /* Used as non-details section title */
    div.section > .section-title {
      padding: 12px 20px;
    }

    .count {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--muted);
      margin-left: auto;
      font-weight: 400;
    }

    /* Slack section */
    .slack-messages {
      padding: 0 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .slack-msg {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 12px;
    }

    .slack-msg-header {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 6px;
    }

    .slack-msg-header strong {
      font-size: 12px;
      color: var(--text);
    }

    .channel-tag {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--blue);
      background: rgba(79, 124, 255, 0.1);
      border-radius: 3px;
      padding: 1px 5px;
    }

    .msg-time {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--muted);
      margin-left: auto;
    }

    .msg-link {
      color: var(--muted);
      font-size: 12px;
      text-decoration: none;
    }

    .msg-link:hover { color: var(--blue); }

    .slack-msg-text {
      font-size: 13px;
      color: var(--text);
      line-height: 1.5;
      word-break: break-word;
    }

    /* Health section */
    .health-alerts {
      padding: 0 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .alert-row {
      display: grid;
      grid-template-columns: 140px 160px 1fr;
      gap: 12px;
      align-items: start;
      font-size: 12px;
      padding: 6px 10px;
      background: var(--surface2);
      border-radius: 4px;
    }

    .alert-channel {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--orange);
    }

    .alert-time {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--muted);
    }

    .alert-text {
      color: var(--text);
      line-height: 1.4;
      word-break: break-word;
    }

    /* Transaction grid */
    .txn-grid {
      padding: 4px 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .txn-row {
      display: grid;
      grid-template-columns: 150px 1fr;
      gap: 12px;
      align-items: baseline;
      padding: 5px 0;
      border-bottom: 1px solid rgba(30, 35, 48, 0.6);
      font-size: 13px;
    }

    .txn-row:last-child { border-bottom: none; }

    .txn-row > span:first-child {
      color: var(--muted);
      font-size: 12px;
    }

    .txn-row code {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--text);
    }

    /* Status badges */
    .status-badge {
      font-family: var(--font-mono);
      font-size: 11px;
      border-radius: 4px;
      padding: 2px 8px;
      font-weight: 500;
    }

    .status-green  { background: rgba(45, 217, 143, 0.15); color: var(--green); border: 1px solid rgba(45, 217, 143, 0.3); }
    .status-red    { background: rgba(255, 95, 95, 0.15);  color: var(--red);   border: 1px solid rgba(255, 95, 95, 0.3); }
    .status-yellow { background: rgba(245, 200, 66, 0.15); color: var(--yellow);border: 1px solid rgba(245, 200, 66, 0.3); }
    .status-muted  { background: rgba(96, 104, 128, 0.15); color: var(--muted); border: 1px solid rgba(96, 104, 128, 0.3); }

    /* Copilot summary */
    .copilot-summary {
      background: var(--surface2);
      margin: 0;
      border-top: 2px solid transparent;
      border-image: linear-gradient(90deg, var(--blue), var(--purple)) 1;
    }

    .copilot-label {
      padding: 14px 20px 8px !important;
      font-size: 13px !important;
      font-weight: 600;
      color: var(--purple) !important;
    }

    .summary-text {
      font-size: 15px;
      line-height: 1.7;
      color: var(--text);
      padding: 0 20px 18px;
    }

    /* Suggested solutions */
    .solutions-section {
      padding-bottom: 4px;
    }

    .solutions-list {
      list-style: none;
      padding: 4px 20px 16px;
      counter-reset: solution;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .solution-item {
      counter-increment: solution;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 12px 14px;
      position: relative;
      padding-left: 44px;
    }

    .solution-item::before {
      content: counter(solution);
      position: absolute;
      left: 14px;
      top: 13px;
      font-family: var(--font-mono);
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      width: 20px;
      text-align: center;
    }

    .solution-action {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 6px;
    }

    .solution-detail {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.6;
    }

    /* Owner badges */
    .owner-badge {
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 500;
      border-radius: 4px;
      padding: 2px 7px;
      flex-shrink: 0;
    }

    .owner-sre    { background: rgba(167, 139, 250, 0.15); color: var(--purple); border: 1px solid rgba(167, 139, 250, 0.3); }
    .owner-payin  { background: rgba(79, 124, 255, 0.15);  color: var(--blue);   border: 1px solid rgba(79, 124, 255, 0.3); }
    .owner-payout { background: rgba(45, 217, 143, 0.15);  color: var(--green);  border: 1px solid rgba(45, 217, 143, 0.3); }
    .owner-payops { background: rgba(255, 140, 66, 0.15);  color: var(--orange); border: 1px solid rgba(255, 140, 66, 0.3); }
    .owner-cs     { background: rgba(245, 200, 66, 0.15);  color: var(--yellow); border: 1px solid rgba(245, 200, 66, 0.3); }

    /* Error state */
    .error-state {
      padding: 20px;
      color: var(--red);
    }

    .error-state strong {
      font-size: 14px;
      display: block;
      margin-bottom: 6px;
    }

    .error-state p {
      font-size: 13px;
      color: var(--muted);
    }

    /* Empty state */
    .empty-state {
      color: var(--muted);
      font-size: 13px;
      padding: 4px 0;
    }

    /* Muted text */
    .muted { color: var(--muted); }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--muted); }
  </style>
</head>
<body>

  <div id="config-warning"></div>

  <header>
    <div class="logo">✦ SRE Copilot</div>
    <div class="logo-sub">Payabli Internal</div>
  </header>

  <div class="input-bar">
    <textarea id="ticket-input" placeholder="SRE-4421, PIN-2776  — or describe the problem: &quot;payments declining for Acme partner&quot;" rows="2"></textarea>
    <button id="analyze-btn">Analyze →</button>
  </div>

  <div id="results"></div>

  <script>
    const CONFIG = {
      ANTHROPIC_API_KEY: '',
      LINEAR_API_KEY:    '',
      SLACK_TOKEN:       '',
      PAYABLI_TOKEN:     '',
      PAYABLI_BASE_URL:  'https://api.payabli.com',
    };

    const SLACK_CHANNELS = {
      helpPayIn:        'C09ER2YGNDR',
      helpPayOps:       'C09EERZE7D5',
      helpPayOut:       'C09EV2P2W4S',
      helpPayPlatform:  'C09EV2REGQ2',
      helpPayAI:        'C09EES01RFH',
      sreAlerts:        'C07TKLMM36F',
      sreProdBugAlerts: 'C0AMGPU08EB',
      sreAlertsNoPage:  'C0AKVGEN77E',
      sreTeam:          'C075VNWSVC3',
      sreReports:       'C0A1127H9SS',
    };

    // ─── Step 1: Fetch Linear Ticket ───────────────────────────────────────────

    async function fetchLinearTicket(ticketId) {
      const query = `
        query IssueByIdentifier($id: String!) {
          issue(id: $id) {
            identifier
            title
            description
            priority
            createdAt
            updatedAt
            state { name type }
            assignee { name email }
            team { name }
            labels { nodes { name } }
            comments {
              nodes { body createdAt user { name } }
            }
          }
        }
      `;

      const response = await fetch('/api/linear', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': CONFIG.LINEAR_API_KEY,
        },
        body: JSON.stringify({ query, variables: { id: ticketId } })
      });

      const data = await response.json();
      if (data.errors) throw new Error(`Linear: ${data.errors[0].message}`);
      if (!data.data?.issue) throw new Error(`Ticket ${ticketId} not found. Check the ID and your Linear API key.`);
      return data.data.issue;
    }

    // ─── Step 2: Extract Identifiers ──────────────────────────────────────────

    function extractIdentifiers(ticket) {
      const text = `${ticket.title} ${ticket.description ?? ''} ${
        ticket.comments?.nodes?.map(c => c.body).join(' ') ?? ''
      }`;

      return {
        partnerName: ticket.title.match(/^([^—–\-]+)[—–\-]/)?.[1]?.trim() ?? null,
        ppid: text.match(/ppid[:\s=#]*(\d{4,6})/i)?.[1] ?? null,
        transactionId: (
          text.match(/\b(\d{3,6}-[a-f0-9]{20,})\b/i)?.[1] ??
          text.match(/\b(TRN_[A-Za-z0-9]{20,})\b/)?.[1] ??
          null
        ),
        orgId: text.match(/org(?:anization)?[\s_]?id[:\s#=]*(\d+)/i)?.[1] ?? null,
        errorCodes: [...text.matchAll(/\b([DE]\d{4})\b/g)].map(m => m[1]),
      };
    }

    // ─── Step 3a: Fetch Slack Context ─────────────────────────────────────────

    async function fetchSlackByTerm(searchTerm) {
      const channelFilter = [
        'help-pay-in', 'help-pay-ops', 'help-pay-out',
        'help-pay-platform', 'sre-team'
      ].map(c => `in:#${c}`).join(' ');

      const params = new URLSearchParams({
        query: `${searchTerm} ${channelFilter}`,
        count: 15,
        sort: 'timestamp',
        sort_dir: 'desc',
      });

      const response = await fetch(`/api/slack/search.messages?${params}`, {
        headers: { 'Authorization': `Bearer ${CONFIG.SLACK_TOKEN}` }
      });

      const data = await response.json();
      if (!data.ok) {
        console.warn('Slack search failed:', data.error);
        return [];
      }

      return (data.messages?.matches ?? []).map(m => ({
        sender:    m.username,
        channel:   m.channel?.name ?? 'unknown',
        ts:        m.ts,
        text:      m.text,
        permalink: m.permalink,
      }));
    }

    async function fetchSlackContext(ticket, identifiers) {
      const searchTerm = identifiers.partnerName
        ?? (identifiers.ppid ? `PPID ${identifiers.ppid}` : null)
        ?? ticket.title.split(/\s+/).slice(0, 5).join(' ');
      return fetchSlackByTerm(searchTerm);
    }

    // ─── Step 3b: Fetch SRE Health Alerts ────────────────────────────────────

    async function fetchSREHealthAlerts() {
      const targets = [
        { id: SLACK_CHANNELS.sreAlerts,        name: 'sre-alerts' },
        { id: SLACK_CHANNELS.sreProdBugAlerts, name: 'sre-prod-bug-alerts' },
      ];

      const results = [];

      for (const ch of targets) {
        const response = await fetch(
          `/api/slack/conversations.history?channel=${ch.id}&limit=20`,
          { headers: { 'Authorization': `Bearer ${CONFIG.SLACK_TOKEN}` } }
        );
        const data = await response.json();
        if (!data.ok) {
          console.warn(`Slack history failed for ${ch.name}:`, data.error);
          continue;
        }

        for (const msg of data.messages ?? []) {
          if (!msg.text?.trim()) continue;
          results.push({
            channel: ch.name,
            ts:      msg.ts,
            time:    new Date(parseFloat(msg.ts) * 1000).toLocaleString(),
            text:    msg.text,
          });
        }
      }

      return results
        .sort((a, b) => parseFloat(b.ts) - parseFloat(a.ts))
        .slice(0, 20);
    }

    // ─── Step 4: Fetch Payabli Transaction ───────────────────────────────────

    async function fetchPayabliTransaction(transactionId) {
      try {
        const response = await fetch(
          `https://api.payabli.com/api/query/transactions/org/2?transId=${encodeURIComponent(transactionId)}&limitRecord=1`,
          {
            headers: {
              'requestToken': CONFIG.PAYABLI_TOKEN,
              'Content-Type': 'application/json',
            }
          }
        );

        if (!response.ok) {
          console.warn('Payabli API error:', response.status);
          return null;
        }

        const data = await response.json();
        const txn = data.Records?.[0] ?? data.data?.[0] ?? null;
        if (!txn) return null;

        return {
          transId:        txn.TransactionId ?? txn.transId ?? transactionId,
          amount:         txn.TransactionData?.TotalAmount ?? txn.amount ?? '—',
          status:         txn.TransactionStatus ?? txn.status ?? '—',
          resultCode:     txn.ResultCode ?? txn.resultCode ?? '—',
          resultCodeText: txn.ResultCodeText ?? txn.resultCodeText ?? '—',
          paymentMethod:  txn.PaymentData?.CardType ?? txn.PaymentData?.AccountType ?? '—',
          createdAt:      txn.TransactionDate ?? txn.createdAt ?? '—',
          ppid:           txn.PaypointId ?? txn.ppid ?? '—',
          processorRef:   txn.ReferenceData?.ProcessorReferenceId ?? '—',
        };
      } catch (e) {
        console.warn('Payabli fetch failed:', e);
        return null;
      }
    }

    // ─── Step 5: Anthropic Copilot Summary ───────────────────────────────────

    async function generateCopilotSummary({ ticket, identifiers, slackMessages, healthAlerts, transaction }) {
      const priorityLabels = ['None', 'Urgent', 'High', 'Medium', 'Low'];

      const context = `
## TICKET
ID: ${ticket.identifier}
Title: ${ticket.title}
Priority: ${priorityLabels[ticket.priority] ?? 'Unknown'}
Status: ${ticket.state?.name}
Team: ${ticket.team?.name}
Assignee: ${ticket.assignee?.name ?? 'Unassigned'}
Created: ${new Date(ticket.createdAt).toLocaleString()}

Description:
${ticket.description ?? '(no description provided)'}

${ticket.comments?.nodes?.length ? `Comments:\n${
  ticket.comments.nodes.slice(0, 5).map(c =>
    `[${c.user?.name ?? 'unknown'}]: ${c.body}`
  ).join('\n')
}` : ''}

## EXTRACTED IDENTIFIERS
Partner: ${identifiers.partnerName ?? 'not detected'}
PPID: ${identifiers.ppid ?? 'not detected'}
Transaction ID: ${identifiers.transactionId ?? 'not detected'}
Error Codes: ${identifiers.errorCodes.length ? identifiers.errorCodes.join(', ') : 'none'}

## SLACK CONTEXT
${slackMessages.length
  ? slackMessages.map(m =>
      `[${m.sender}] [#${m.channel}] ${new Date(parseFloat(m.ts)*1000).toLocaleString()}: ${m.text}`
    ).join('\n')
  : 'No related Slack messages found in help or SRE channels.'}

## SYSTEM HEALTH (recent SRE alerts)
${healthAlerts.length
  ? healthAlerts.slice(0, 10).map(a =>
      `[${a.time}] [#${a.channel}]: ${a.text}`
    ).join('\n')
  : 'No recent system alerts found.'}

## TRANSACTION DETAILS
${transaction ? `
Transaction ID:  ${transaction.transId}
Amount:          $${transaction.amount}
Status:          ${transaction.status}
Result Code:     ${transaction.resultCode} — ${transaction.resultCodeText}
Payment Method:  ${transaction.paymentMethod}
PPID:            ${transaction.ppid}
Processor Ref:   ${transaction.processorRef}
Created:         ${transaction.createdAt}
`.trim() : 'No transaction data available for this ticket.'}
`.trim();

      const response = await fetch('/api/anthropic', {
        method: 'POST',
        headers: {
          'Content-Type':      'application/json',
          'x-api-key':         CONFIG.ANTHROPIC_API_KEY,
          'anthropic-version': '2023-06-01',
        },
        body: JSON.stringify({
          model:      'claude-sonnet-4-6',
          max_tokens: 1500,
          messages: [{
            role: 'user',
            content: `You are an SRE copilot at Payabli, a B2B payment processing company.
Payabli processes payments via processors: Fiserv, Global Payments (GP), NMI.
Key terms: PayIn=collecting payments, PayOut=vendor payments, PPID=paypoint ID,
batch close=end-of-day processing, EBF=electronic batch funding,
webhooks/notifications=event delivery to partners, SRE=site reliability engineering.
Error codes: D-codes are processor declines, E-codes are platform errors.

Analyze the following ticket context and return a structured analysis.

${context}

Return ONLY valid JSON with no markdown fences, no explanation outside the JSON:
{
  "summary": "Give a summary of - What is broken, the most likely root cause, business impact, and what has already been tried based on Slack. Be specific — name the system, error codes, partner.",
  "suggestedSolutions": [
    {
      "step": 1,
      "action": "Short imperative action title",
      "detail": "Specific how-to: exact endpoint to call, DB query to run, Slack channel to check, or CloudWatch log to inspect. Be concrete.",
      "owner": "SRE | PayIn | PayOut | PayOps | CS"
    }
  ]
}
Provide 1-2 solutions ordered by: quickest to execute and most likely to resolve first.`
          }]
        })
      });

      if (!response.ok) {
        const err = await response.json().catch(() => ({}));
        throw new Error(`Anthropic API: ${err.error?.message ?? response.status}`);
      }

      const data = await response.json();
      const raw = data.content[0].text;

      try {
        return JSON.parse(raw);
      } catch {
        console.error('Claude raw response:', raw);
        const cleaned = raw.replace(/^```(?:json)?\n?/, '').replace(/\n?```$/, '').trim();
        try {
          return JSON.parse(cleaned);
        } catch {
          throw new Error('AI analysis failed — could not parse response JSON');
        }
      }
    }

    // ─── Step 6: Orchestration ────────────────────────────────────────────────

    async function analyzeTickets(ticketIds) {
      const container = document.getElementById('results');
      container.innerHTML = '';

      const healthAlerts = await fetchSREHealthAlerts().catch(() => []);

      for (const ticketId of ticketIds) {
        const card = createTicketCard(ticketId);
        container.appendChild(card);
        card.classList.add('loading');

        try {
          updateCardStatus(card, 'Fetching from Linear...');
          const ticket = await fetchLinearTicket(ticketId);
          renderTicketHeader(card, ticket);

          const identifiers = extractIdentifiers(ticket);

          updateCardStatus(card, 'Searching Slack and fetching transaction...');
          const [slackMessages, transaction] = await Promise.all([
            fetchSlackContext(ticket, identifiers).catch(() => []),
            identifiers.transactionId
              ? fetchPayabliTransaction(identifiers.transactionId).catch(() => null)
              : Promise.resolve(null),
          ]);

          renderSlackSection(card, slackMessages);
          renderHealthSection(card, healthAlerts);
          if (transaction) renderTransactionSection(card, transaction);

          updateCardStatus(card, 'Generating AI analysis...');
          const analysis = await generateCopilotSummary({
            ticket, identifiers, slackMessages, healthAlerts, transaction
          });

          renderCopilotSummary(card, analysis.summary);
          renderSuggestedSolutions(card, analysis.suggestedSolutions);
          updateCardStatus(card, null);
          card.classList.remove('loading');
          card.style.borderLeftColor = 'var(--green)';

        } catch (err) {
          card.classList.remove('loading');
          card.style.borderLeftColor = 'var(--red)';
          renderCardError(card, ticketId, err.message);
        }
      }
    }

    // ─── Description-mode Orchestration ──────────────────────────────────────

    async function analyzeDescription(description) {
      const container = document.getElementById('results');
      container.innerHTML = '';

      const healthAlerts = await fetchSREHealthAlerts().catch(() => []);

      const label = description.length > 40 ? description.slice(0, 40) + '…' : description;
      const card = createTicketCard(label);
      container.appendChild(card);
      card.classList.add('loading');

      try {
        renderDescriptionHeader(card, description);

        updateCardStatus(card, 'Searching Slack...');
        const searchTerm = description.split(/\s+/).slice(0, 6).join(' ');
        const slackMessages = await fetchSlackByTerm(searchTerm).catch(() => []);

        renderSlackSection(card, slackMessages);
        renderHealthSection(card, healthAlerts);

        updateCardStatus(card, 'Generating AI analysis...');

        // Build context without a Linear ticket
        const context = `
## PROBLEM DESCRIPTION
${description}

## SLACK CONTEXT
${slackMessages.length
  ? slackMessages.map(m =>
      `[${m.sender}] [#${m.channel}] ${new Date(parseFloat(m.ts)*1000).toLocaleString()}: ${m.text}`
    ).join('\n')
  : 'No related Slack messages found in help or SRE channels.'}

## SYSTEM HEALTH (recent SRE alerts)
${healthAlerts.length
  ? healthAlerts.slice(0, 10).map(a =>
      `[${a.time}] [#${a.channel}]: ${a.text}`
    ).join('\n')
  : 'No recent system alerts found.'}
`.trim();

        const response = await fetch('/api/anthropic', {
          method: 'POST',
          headers: {
            'Content-Type':      'application/json',
            'x-api-key':         CONFIG.ANTHROPIC_API_KEY,
            'anthropic-version': '2023-06-01',
          },
          body: JSON.stringify({
            model:      'claude-sonnet-4-6',
            max_tokens: 1500,
            messages: [{
              role: 'user',
              content: `You are an SRE copilot at Payabli, a B2B payment processing company.
Payabli processes payments via processors: Fiserv, Global Payments (GP), NMI.
Key terms: PayIn=collecting payments, PayOut=vendor payments, PPID=paypoint ID,
batch close=end-of-day processing, EBF=electronic batch funding,
webhooks/notifications=event delivery to partners, SRE=site reliability engineering.
Error codes: D-codes are processor declines, E-codes are platform errors.

Analyze the following problem description and context, then return a structured analysis.

${context}

Return ONLY valid JSON with no markdown fences, no explanation outside the JSON:
{
  "summary": "3-5 sentences. What is likely broken, the most probable root cause, business impact, and any clues from Slack. Be specific — name the system, error codes, partner.",
  "suggestedSolutions": [
    {
      "step": 1,
      "action": "Short imperative action title",
      "detail": "Specific how-to: exact endpoint to call, DB query to run, Slack channel to check, or CloudWatch log to inspect. Be concrete.",
      "owner": "SRE | PayIn | PayOut | PayOps | CS"
    }
  ]
}
Provide 3-5 solutions ordered by: quickest to execute and most likely to resolve first.`
            }]
          })
        });

        if (!response.ok) {
          const err = await response.json().catch(() => ({}));
          throw new Error(`Anthropic API: ${err.error?.message ?? response.status}`);
        }

        const data = await response.json();
        const raw = data.content[0].text;
        let analysis;
        try {
          analysis = JSON.parse(raw);
        } catch {
          console.error('Claude raw response:', raw);
          const cleaned = raw.replace(/^```(?:json)?\n?/, '').replace(/\n?```$/, '').trim();
          analysis = JSON.parse(cleaned);
        }

        renderCopilotSummary(card, analysis.summary);
        renderSuggestedSolutions(card, analysis.suggestedSolutions);
        updateCardStatus(card, null);
        card.classList.remove('loading');
        card.style.borderLeftColor = 'var(--green)';

      } catch (err) {
        card.classList.remove('loading');
        card.style.borderLeftColor = 'var(--red)';
        renderCardError(card, label, err.message);
      }
    }

    // ─── Rendering ────────────────────────────────────────────────────────────

    function createTicketCard(ticketId) {
      const card = document.createElement('div');
      card.className = 'ticket-card';
      card.innerHTML = `
        <div class="card-topbar">
          <span class="ticket-id-badge">${escapeHtml(ticketId)}</span>
          <span class="card-status"></span>
        </div>
        <div class="card-body"></div>
      `;
      return card;
    }

    function updateCardStatus(card, msg) {
      card.querySelector('.card-status').textContent = msg ?? '';
    }

    function renderTicketHeader(card, ticket) {
      const priorities = ['—', '🔴 Urgent', '🟠 High', '🟡 Medium', '⚪ Low'];
      card.querySelector('.card-body').insertAdjacentHTML('beforeend', `
        <div class="ticket-header">
          <h2 class="ticket-title">${escapeHtml(ticket.title)}</h2>
          <div class="ticket-meta">
            <span class="meta-pill">${priorities[ticket.priority] ?? '—'}</span>
            <span class="meta-pill">${escapeHtml(ticket.state?.name ?? 'Unknown')}</span>
            <span class="meta-pill">${escapeHtml(ticket.assignee?.name ?? 'Unassigned')}</span>
            <span class="meta-pill">${escapeHtml(ticket.team?.name ?? '')}</span>
            <span class="meta-pill muted">${new Date(ticket.createdAt).toLocaleDateString()}</span>
          </div>
          ${ticket.description ? `
            <details class="description-block">
              <summary>Description</summary>
              <pre class="description-text">${escapeHtml(ticket.description)}</pre>
            </details>` : ''}
        </div>
      `);
    }

    function renderDescriptionHeader(card, description) {
      card.querySelector('.card-body').insertAdjacentHTML('beforeend', `
        <div class="ticket-header">
          <h2 class="ticket-title">${escapeHtml(description)}</h2>
          <div class="ticket-meta">
            <span class="meta-pill muted">Free-text search</span>
          </div>
        </div>
      `);
    }

    function renderSlackSection(card, messages) {
      const html = messages.length
        ? messages.map(m => `
            <div class="slack-msg">
              <div class="slack-msg-header">
                <strong>${escapeHtml(m.sender)}</strong>
                <span class="channel-tag">#${escapeHtml(m.channel)}</span>
                <span class="msg-time">${new Date(parseFloat(m.ts)*1000).toLocaleString()}</span>
                ${m.permalink ? `<a href="${escapeHtml(m.permalink)}" target="_blank" class="msg-link">↗</a>` : ''}
              </div>
              <div class="slack-msg-text">${escapeHtml(m.text)}</div>
            </div>`).join('')
        : '<p class="empty-state">No related messages found in help or SRE channels.</p>';

      card.querySelector('.card-body').insertAdjacentHTML('beforeend', `
        <details class="section slack-section" open>
          <summary class="section-title">
            🔍 Slack Context
            ${messages.length ? `<span class="count">${messages.length} messages</span>` : ''}
          </summary>
          <div class="slack-messages">${html}</div>
        </details>
      `);
    }

    function renderHealthSection(card, alerts) {
      if (!alerts.length) return;
      card.querySelector('.card-body').insertAdjacentHTML('beforeend', `
        <details class="section health-section">
          <summary class="section-title">
            ⚡ System Health <span class="count">${alerts.length} recent alerts</span>
          </summary>
          <div class="health-alerts">
            ${alerts.map(a => `
              <div class="alert-row">
                <span class="alert-channel">#${escapeHtml(a.channel)}</span>
                <span class="alert-time">${escapeHtml(a.time)}</span>
                <span class="alert-text">${escapeHtml(a.text.slice(0, 220))}</span>
              </div>`).join('')}
          </div>
        </details>
      `);
    }

    function renderTransactionSection(card, txn) {
      const statusClass = {
        'approved': 'status-green', 'success': 'status-green',
        'declined': 'status-red',   'failed':  'status-red',
        'pending':  'status-yellow','void':    'status-muted',
      }[txn.status?.toLowerCase()] ?? 'status-muted';

      card.querySelector('.card-body').insertAdjacentHTML('beforeend', `
        <details class="section txn-section" open>
          <summary class="section-title">💳 Transaction Details</summary>
          <div class="txn-grid">
            <div class="txn-row"><span>Transaction ID</span><code>${escapeHtml(txn.transId)}</code></div>
            <div class="txn-row"><span>Amount</span><strong>$${escapeHtml(String(txn.amount))}</strong></div>
            <div class="txn-row"><span>Status</span><span class="status-badge ${statusClass}">${escapeHtml(txn.status)}</span></div>
            <div class="txn-row"><span>Result Code</span><code>${escapeHtml(txn.resultCode)}</code> <span class="muted">${escapeHtml(txn.resultCodeText)}</span></div>
            <div class="txn-row"><span>Payment Method</span>${escapeHtml(txn.paymentMethod)}</div>
            <div class="txn-row"><span>PPID</span>${escapeHtml(String(txn.ppid))}</div>
            <div class="txn-row"><span>Processor Ref</span><code>${escapeHtml(txn.processorRef)}</code></div>
            <div class="txn-row"><span>Created</span>${escapeHtml(txn.createdAt)}</div>
          </div>
        </details>
      `);
    }

    function renderCopilotSummary(card, summary) {
      card.querySelector('.card-body').insertAdjacentHTML('beforeend', `
        <div class="section copilot-summary">
          <div class="section-title copilot-label">✦ Copilot Summary</div>
          <p class="summary-text">${escapeHtml(summary)}</p>
        </div>
      `);
    }

    function renderSuggestedSolutions(card, solutions) {
      const ownerClass = {
        'SRE':    'owner-sre',
        'PayIn':  'owner-payin',
        'PayOut': 'owner-payout',
        'PayOps': 'owner-payops',
        'CS':     'owner-cs',
      };
      card.querySelector('.card-body').insertAdjacentHTML('beforeend', `
        <div class="section solutions-section">
          <div class="section-title" style="padding: 12px 20px;">💡 Suggested Solutions</div>
          <ol class="solutions-list">
            ${solutions.map(s => `
              <li class="solution-item">
                <div class="solution-action">
                  ${escapeHtml(s.action)}
                  <span class="owner-badge ${ownerClass[s.owner] ?? ''}">${escapeHtml(s.owner)}</span>
                </div>
                <div class="solution-detail">${escapeHtml(s.detail)}</div>
              </li>`).join('')}
          </ol>
        </div>
      `);
    }

    function renderCardError(card, ticketId, message) {
      updateCardStatus(card, '⚠ Error');
      card.querySelector('.card-body').innerHTML = `
        <div class="error-state">
          <strong>Failed to analyze ${escapeHtml(ticketId)}</strong>
          <p>${escapeHtml(message)}</p>
        </div>
      `;
    }

    function escapeHtml(str) {
      if (str == null) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    // ─── Event Wiring ─────────────────────────────────────────────────────────

    document.getElementById('analyze-btn').addEventListener('click', () => {
      const raw = document.getElementById('ticket-input').value.trim();
      if (!raw) return;

      // Extract any ticket IDs present in the input
      const ids = raw
        .split(/[\s,\n]+/)
        .map(id => id.trim().toUpperCase())
        .filter(id => /^[A-Z]+-\d+$/.test(id));

      if (ids.length) {
        analyzeTickets(ids);
      } else {
        // Treat entire input as a free-text problem description
        analyzeDescription(raw);
      }
    });

    document.getElementById('ticket-input').addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        document.getElementById('analyze-btn').click();
      }
    });

    window.addEventListener('DOMContentLoaded', () => {
      const missing = Object.entries(CONFIG)
        .filter(([k, v]) => !v && k !== 'PAYABLI_BASE_URL')
        .map(([k]) => k);

      if (missing.length) {
        const banner = document.getElementById('config-warning');
        banner.textContent = `⚠ Missing credentials: ${missing.join(', ')} — fill in CONFIG before analyzing.`;
        banner.style.display = 'block';
      }
    });
  </script>
</body>
</html>
